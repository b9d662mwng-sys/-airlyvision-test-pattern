<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>AirlyVision Test Pattern Maker</title>
  <style>
    :root{
      --bg:#07111f;--panel:#0f1c2d;--panel2:#13243a;--line:#2a3d56;
      --text:#f4f8ff;--muted:#9db0c8;--accent:#43a5ff;--ok:#41d38a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;background:linear-gradient(180deg,#07111f,#0a1525);
      color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    header{
      position:sticky;top:0;z-index:20;padding:16px 18px;
      background:rgba(7,17,31,.92);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--line)
    }
    h1{font-size:20px;margin:0}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    main{display:grid;grid-template-columns:360px 1fr;gap:18px;padding:18px;min-height:calc(100vh - 74px)}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px}
    .section-title{font-size:14px;font-weight:700;margin:0 0 12px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,button{
      width:100%;border-radius:10px;border:1px solid var(--line);
      background:var(--panel2);color:var(--text);padding:11px 12px;font-size:15px
    }
    input[type="color"]{height:42px;padding:4px}
    .row{margin-bottom:12px}
    .checks{display:grid;gap:8px}
    .check{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text)}
    .check input{width:20px;height:20px}
    button{font-weight:700;cursor:pointer}
    .primary{background:var(--accent);border-color:transparent;color:#001426}
    .secondary{background:#1a2d46}
    .preview-wrap{display:flex;flex-direction:column;gap:12px;min-width:0}
    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .badge{font-size:12px;color:var(--muted);padding:7px 10px;border:1px solid var(--line);border-radius:999px}
    .canvas-shell{
      background:#02060c;border:1px solid var(--line);border-radius:16px;
      min-height:420px;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto
    }
    canvas{max-width:100%;max-height:72vh;box-shadow:0 16px 45px rgba(0,0,0,.4);background:#000}
    .note{font-size:12px;line-height:1.6;color:var(--muted)}
    .divider{height:1px;background:var(--line);margin:16px 0}
    @media(max-width:850px){
      main{grid-template-columns:1fr;padding:12px}
      .canvas-shell{min-height:300px}
      header{padding-top:max(14px,env(safe-area-inset-top))}
    }
  </style>
</head>
<body>
<header>
  <h1>AirlyVision Test Pattern Maker</h1>
  <div class="sub">LEDビジョン用テストパターン生成</div>
</header>

<main>
  <section class="card">
    <h2 class="section-title">出力サイズ</h2>
    <div class="grid2">
      <div class="row"><label>横解像度(px)</label><input id="width" type="number" min="1" value="1920"></div>
      <div class="row"><label>縦解像度(px)</label><input id="height" type="number" min="1" value="1080"></div>
    </div>

    <h2 class="section-title">LEDパネル設定</h2>
    <div class="grid2">
      <div class="row"><label>1枚の横解像度</label><input id="panelW" type="number" min="1" value="192"></div>
      <div class="row"><label>1枚の縦解像度</label><input id="panelH" type="number" min="1" value="108"></div>
      <div class="row"><label>横枚数</label><input id="cols" type="number" min="1" value="10"></div>
      <div class="row"><label>縦枚数</label><input id="rows" type="number" min="1" value="10"></div>
    </div>
    <button id="calcSize" class="secondary">パネル設定から出力サイズを計算</button>

    <div class="divider"></div>

    <h2 class="section-title">パターン</h2>
    <div class="row">
      <label>種類</label>
      <select id="pattern">
        <option value="grid">グリッド</option>
        <option value="checker">チェッカー</option>
        <option value="bars">カラーバー</option>
        <option value="white">白</option>
        <option value="black">黒</option>
        <option value="red">赤</option>
        <option value="green">緑</option>
        <option value="blue">青</option>
        <option value="gray">グレースケール</option>
      </select>
    </div>
    <div class="grid2">
      <div class="row"><label>背景色</label><input id="bg" type="color" value="#101010"></div>
      <div class="row"><label>線色</label><input id="lineColor" type="color" value="#ffffff"></div>
    </div>

    <div class="checks">
      <label class="check"><input id="showPanel" type="checkbox" checked>パネル境界線</label>
      <label class="check"><input id="showNumber" type="checkbox" checked>パネル番号</label>
      <label class="check"><input id="showCenter" type="checkbox" checked>中央十字</label>
      <label class="check"><input id="showInfo" type="checkbox" checked>解像度表示</label>
      <label class="check"><input id="showSafe" type="checkbox">セーフエリア(90%)</label>
    </div>

    <div class="divider"></div>

    <div class="row"><label>ファイル名</label><input id="filename" value="AirlyVision-Test-Pattern"></div>
    <button id="download" class="primary">PNGを保存</button>
    <p class="note">入力内容はブラウザ内だけで処理されます。画像は外部へ送信されません。</p>
  </section>

  <section class="preview-wrap">
    <div class="toolbar">
      <span class="badge" id="sizeBadge">1920 × 1080 px</span>
      <span class="badge" id="panelBadge">10 × 10 panels</span>
    </div>
    <div class="canvas-shell"><canvas id="canvas" width="1920" height="1080"></canvas></div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
const canvas = $('canvas');
const ctx = canvas.getContext('2d');

const ids = ['width','height','panelW','panelH','cols','rows','pattern','bg','lineColor',
             'showPanel','showNumber','showCenter','showInfo','showSafe'];
ids.forEach(id => $(id).addEventListener('input', draw));

$('calcSize').addEventListener('click', () => {
  $('width').value = Math.max(1, +$('panelW').value) * Math.max(1, +$('cols').value);
  $('height').value = Math.max(1, +$('panelH').value) * Math.max(1, +$('rows').value);
  draw();
});

$('download').addEventListener('click', () => {
  draw();
  const name = ($('filename').value || 'AirlyVision-Test-Pattern').replace(/[\\/:*?"<>|]/g,'_');
  const a = document.createElement('a');
  a.download = name + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

function vals(){
  return {
    w:Math.max(1,Math.min(12000,+$('width').value||1920)),
    h:Math.max(1,Math.min(12000,+$('height').value||1080)),
    pw:Math.max(1,+$('panelW').value||192),
    ph:Math.max(1,+$('panelH').value||108),
    cols:Math.max(1,+$('cols').value||1),
    rows:Math.max(1,+$('rows').value||1),
    pattern:$('pattern').value,
    bg:$('bg').value,
    line:$('lineColor').value
  }
}
function fillPattern(v){
  const {w,h,pattern,bg}=v;
  ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

  if(['white','black','red','green','blue'].includes(pattern)){
    const colors={white:'#fff',black:'#000',red:'#f00',green:'#0f0',blue:'#00f'};
    ctx.fillStyle=colors[pattern];ctx.fillRect(0,0,w,h);return;
  }
  if(pattern==='bars'){
    const c=['#fff','#ff0','#0ff','#0f0','#f0f','#f00','#00f','#000'];
    c.forEach((x,i)=>{ctx.fillStyle=x;ctx.fillRect(i*w/c.length,0,w/c.length,h)});
  } else if(pattern==='gray'){
    for(let i=0;i<10;i++){
      const g=Math.round(255*i/9);
      ctx.fillStyle=`rgb(${g},${g},${g})`;
      ctx.fillRect(i*w/10,0,w/10,h);
    }
  } else if(pattern==='checker'){
    const s=Math.max(20,Math.round(Math.min(w,h)/12));
    for(let y=0;y<h;y+=s)for(let x=0;x<w;x+=s){
      ctx.fillStyle=((x/s+y/s)%2===0)?'#fff':'#000';ctx.fillRect(x,y,s,s);
    }
  } else {
    const step=Math.max(20,Math.round(Math.min(w,h)/20));
    ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=Math.max(1,w/1920);
    ctx.beginPath();
    for(let x=0;x<=w;x+=step){ctx.moveTo(x,0);ctx.lineTo(x,h)}
    for(let y=0;y<=h;y+=step){ctx.moveTo(0,y);ctx.lineTo(w,y)}
    ctx.stroke();
  }
}
function draw(){
  const v=vals();
  canvas.width=v.w;canvas.height=v.h;
  fillPattern(v);

  const sx=v.w/v.cols, sy=v.h/v.rows;
  const lw=Math.max(2,Math.min(v.w,v.h)/500);
  ctx.strokeStyle=v.line;ctx.lineWidth=lw;

  if($('showPanel').checked){
    ctx.beginPath();
    for(let c=0;c<=v.cols;c++){const x=c*sx;ctx.moveTo(x,0);ctx.lineTo(x,v.h)}
    for(let r=0;r<=v.rows;r++){const y=r*sy;ctx.moveTo(0,y);ctx.lineTo(v.w,y)}
    ctx.stroke();
  }
  if($('showNumber').checked && v.cols*v.rows<=400){
    const fs=Math.max(10,Math.min(sx,sy)*.22);
    ctx.font=`700 ${fs}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
    for(let r=0;r<v.rows;r++)for(let c=0;c<v.cols;c++){
      const t=String(r*v.cols+c+1);
      ctx.lineWidth=Math.max(2,fs/10);ctx.strokeStyle='rgba(0,0,0,.75)';
      ctx.strokeText(t,(c+.5)*sx,(r+.5)*sy);
      ctx.fillStyle=v.line;ctx.fillText(t,(c+.5)*sx,(r+.5)*sy);
    }
  }
  if($('showCenter').checked){
    ctx.strokeStyle='#ff2d55';ctx.lineWidth=Math.max(3,lw*1.5);
    ctx.beginPath();ctx.moveTo(v.w/2,0);ctx.lineTo(v.w/2,v.h);
    ctx.moveTo(0,v.h/2);ctx.lineTo(v.w,v.h/2);ctx.stroke();
    ctx.beginPath();ctx.arc(v.w/2,v.h/2,Math.min(v.w,v.h)*.12,0,Math.PI*2);ctx.stroke();
  }
  if($('showSafe').checked){
    const mX=v.w*.05,mY=v.h*.05;
    ctx.setLineDash([Math.max(8,lw*4),Math.max(8,lw*4)]);
    ctx.strokeStyle='#ffd60a';ctx.lineWidth=lw;
    ctx.strokeRect(mX,mY,v.w-mX*2,v.h-mY*2);ctx.setLineDash([]);
  }
  if($('showInfo').checked){
    const fs=Math.max(18,Math.min(v.w,v.h)*.035);
    const text=`${v.w} × ${v.h} px  /  ${v.cols} × ${v.rows} panels`;
    ctx.font=`700 ${fs}px sans-serif`;ctx.textAlign='left';ctx.textBaseline='top';
    const pad=fs*.45;
    const tw=ctx.measureText(text).width;
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(pad,pad,tw+pad*2,fs+pad*1.5);
    ctx.fillStyle='#fff';ctx.fillText(text,pad*2,pad*1.25);
  }

  $('sizeBadge').textContent=`${v.w} × ${v.h} px`;
  $('panelBadge').textContent=`${v.cols} × ${v.rows} panels`;
  localStorage.setItem('airlyPatternSettings', JSON.stringify(
    Object.fromEntries(ids.map(id=>[id,$(id).type==='checkbox'?$(id).checked:$(id).value]))
  ));
}
try{
  const s=JSON.parse(localStorage.getItem('airlyPatternSettings')||'null');
  if(s) ids.forEach(id=>{if(s[id]!==undefined){$(id).type==='checkbox'?$(id).checked=s[id]:$(id).value=s[id]}})
}catch(e){}
draw();
</script>
</body>
</html>
